name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: sudo apt-get install -y espeak-ng

      - name: Build cross-platform binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version: $VERSION"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          mkdir -p build

          # Linux amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" -o build/airadio-linux-amd64 .

          # Linux arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" -o build/airadio-linux-arm64 .

          # macOS amd64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" -o build/airadio-darwin-amd64 .

          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" -o build/airadio-darwin-arm64 .

          # Windows amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" -o build/airadio-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/airadio-linux-amd64
            build/airadio-linux-arm64
            build/airadio-darwin-amd64
            build/airadio-darwin-arm64
            build/airadio-windows-amd64.exe
            install.sh
