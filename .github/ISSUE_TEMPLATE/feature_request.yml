name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "FEAT: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement!
        Before submitting, please check [existing issues](https://github.com/chaseputnam/ai-radio-fm/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What use case are you trying to enable?
      placeholder: "Example: I want to assign different TTS voices per host persona but the station uses one voice globally..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed.
      placeholder: "Example: Add a voice field to each persona in personas.yaml that overrides the default KOKORO_VOICE..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this relate to?
      options:
        - CLI (cmd/)
        - API server (api/)
        - Operator daemon (operator/)
        - Streaming engine (streamer/)
        - Content generation (generator/)
        - Anthropic / script writing
        - Kokoro TTS integration
        - MusicGen integration
        - Multi-station support (stations.sh)
        - Config / YAML parsing (config/)
        - Ledger / history (ledger/)
        - Installation / setup
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, references, or examples that would help.
    validations:
      required: false
